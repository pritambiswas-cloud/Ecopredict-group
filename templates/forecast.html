<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPredict - AI Forecast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <nav class="flex items-center justify-between px-10 py-5 bg-slate-800/50 backdrop-blur-md sticky top-0 z-50 border-b border-white/10">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-teal-500 rounded-lg flex items-center justify-center text-white">
                <i class="fas fa-robot"></i>
            </div>
            <span class="text-2xl font-bold text-white tracking-tight">EcoPredict <span class="text-teal-400">AI</span></span>
        </div>
        <a href="/" class="text-slate-400 hover:text-white font-medium transition-colors">← Back to Home</a>
    </nav>

    <div class="max-w-6xl mx-auto px-6 py-16">
        <header class="mb-12 text-center">
            <h1 class="text-5xl font-black mb-4">3-Day Air Quality Forecast</h1>
            <p class="text-slate-400 text-lg">Machine learning analysis based on current atmospheric pressure and wind patterns.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
            {% for day in forecast_data %}
            <div class="bg-slate-800/50 border border-white/10 p-8 rounded-[2.5rem] shadow-2xl hover:border-teal-500/50 transition-all group">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-teal-400 font-bold tracking-widest uppercase text-xs">{{ day.day }}</span>
                    <i class="fas fa-cloud-sun text-slate-500 group-hover:text-teal-400 transition-colors"></i>
                </div>
                
                <div class="mb-4">
                    <span class="text-6xl font-black" style="color: {{ day.color }}">{{ day.aqi }}</span>
                    <span class="text-slate-500 font-bold ml-2">AQI</span>
                </div>

                <div class="inline-block px-4 py-1 rounded-full text-xs font-bold mb-6" 
                     style="background-color: {{ day.color }}20; color: {{ day.color }}; border: 1px solid {{ day.color }}40">
                    {{ day.status }}
                </div>

                <div class="space-y-3 pt-6 border-t border-white/5">
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-500">Confidence</span>
                        <span class="text-teal-400">94%</span>
                    </div>
                    <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-teal-500 h-full" style="width: 94%"></div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="bg-teal-900/20 border border-teal-500/20 p-10 rounded-[3rem] flex flex-col md:flex-row gap-10 items-center">
            <div class="flex-1">
                <h3 class="text-2xl font-bold mb-4 text-teal-400">Why this prediction?</h3>
                <p class="text-slate-400 leading-relaxed">
